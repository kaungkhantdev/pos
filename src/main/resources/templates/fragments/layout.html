<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<!-- ===== HEAD META FRAGMENT ===== -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Astronity POS'">Astronity POS</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hugeicons -->
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"/>
    <script>
        tailwind.config = { daisyui: { themes: ["light"] } }
    </script>
</th:block>

<!-- ===== NAVBAR FRAGMENT ===== -->
<div th:fragment="navbar"
     class="navbar bg-neutral text-neutral-content fixed top-0 inset-x-0 z-50 h-14 min-h-0 px-4 shadow-lg">

    <!-- Hamburger (mobile) + brand -->
    <div class="flex items-center gap-3 flex-1">
        <a th:href="@{/home}" class="flex items-center gap-2 font-bold text-lg">
            <i class="hgi-stroke hgi-shopping-bag-check text-warning text-xl"></i>
            <span>Astronity <span class="text-warning">POS</span></span>
        </a>
    </div>

    <!-- Right: clock + user menu -->
    <div class="flex items-center gap-4">
        <span id="liveClock" class="text-sm text-neutral-400 hidden sm:block tabular-nums"></span>

        <div class="dropdown dropdown-end">
            <label tabindex="0" class="btn btn-sm btn-ghost gap-2 cursor-pointer">
                <i class="hgi-stroke hgi-user-circle text-xl"></i>
                <span class="hidden sm:inline" sec:authentication="name">User</span>
                <i class="hgi-stroke hgi-arrow-down-01 text-xs"></i>
            </label>
            <ul tabindex="0"
                class="dropdown-content menu menu-sm bg-neutral text-neutral-content rounded-box mt-2 w-44 shadow-xl border border-neutral-700 p-1 z-50">
                <li><a href="#"><i class="hgi-stroke hgi-user me-2"></i>Profile</a></li>
                <li><a href="#"><i class="hgi-stroke hgi-settings-01 me-2"></i>Settings</a></li>
                <li><hr class="my-1 border-neutral-700"/></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="w-full text-left text-error">
                            <i class="hgi-stroke hgi-logout-01 me-2"></i>Sign Out
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>

</html>
