<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Sign In')}"></th:block>
    <style>
        body {
            background: radial-gradient(ellipse at top left, #1d2330 0%, #111827 60%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="card w-full max-w-sm bg-base-100 shadow-2xl">

    <!-- Card header -->
    <div class="bg-neutral rounded-t-2xl px-8 pt-8 pb-6 text-center">
        <div class="avatar placeholder mb-3">
            <div class="bg-warning/15 text-warning rounded-2xl w-16">
                <i class="hgi-stroke hgi-shopping-bag-check text-3xl"></i>
            </div>
        </div>
        <h1 class="text-white font-bold text-xl">Astronity POS</h1>
        <p class="text-neutral-400 text-sm mt-1">Point of Sale System</p>
    </div>

    <!-- Card body -->
    <div class="card-body px-8 pt-6 pb-8">
        <h2 class="font-semibold text-base-content text-base mb-4">Sign in to your account</h2>

        <!-- Alerts -->
        <div th:if="${param.error}"
             class="alert alert-error py-2 px-4 text-sm flex items-center gap-2 mb-4">
            <i class="hgi-stroke hgi-alert-circle text-lg shrink-0"></i>
            <span>Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}"
             class="alert alert-success py-2 px-4 text-sm flex items-center gap-2 mb-4">
            <i class="hgi-stroke hgi-checkmark-circle-01 text-lg shrink-0"></i>
            <span>You have been signed out successfully.</span>
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="post" class="space-y-4" novalidate>

            <!-- Username -->
            <label class="form-control w-full">
                <div class="label pb-1">
                    <span class="label-text text-xs font-semibold text-base-content/60 uppercase tracking-wide">
                        Username
                    </span>
                </div>
                <div class="input input-bordered flex items-center gap-2 focus-within:input-warning">
                    <i class="hgi-stroke hgi-user text-base text-base-content/40"></i>
                    <input type="text"
                           name="username"
                           class="grow bg-transparent outline-none text-sm"
                           placeholder="Enter your username"
                           autocomplete="username"
                           autofocus
                           required/>
                </div>
            </label>

            <!-- Password -->
            <label class="form-control w-full">
                <div class="label pb-1">
                    <span class="label-text text-xs font-semibold text-base-content/60 uppercase tracking-wide">
                        Password
                    </span>
                    <a href="#" class="label-text-alt text-warning hover:underline text-xs">Forgot password?</a>
                </div>
                <div class="input input-bordered flex items-center gap-2 focus-within:input-warning">
                    <i class="hgi-stroke hgi-lock-01 text-base text-base-content/40"></i>
                    <input type="password"
                           id="passwordInput"
                           name="password"
                           class="grow bg-transparent outline-none text-sm"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required/>
                    <button type="button" id="togglePassword" class="btn btn-xs btn-ghost btn-square">
                        <i id="toggleIcon" class="hgi-stroke hgi-view text-base text-base-content/40"></i>
                    </button>
                </div>
            </label>

            <!-- Remember me -->
            <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3 py-0">
                    <input type="checkbox" name="remember-me" class="checkbox checkbox-warning checkbox-sm"/>
                    <span class="label-text text-sm">Keep me signed in</span>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-neutral w-full mt-2">
                <i class="hgi-stroke hgi-login-01 text-base text-warning"></i>
                Sign In
            </button>

        </form>
    </div>

    <div class="text-center pb-5 text-xs text-base-content/40">
        &copy; 2026 Astronity POS &mdash; All rights reserved
    </div>
</div>

<script>
    const passwordInput = document.getElementById('passwordInput');
    const toggleButton  = document.getElementById('togglePassword');
    const toggleIcon    = document.getElementById('toggleIcon');

    toggleButton.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleIcon.className = isHidden
            ? 'hgi-stroke hgi-view-off text-base text-base-content/40'
            : 'hgi-stroke hgi-view text-base text-base-content/40';
    });
</script>
</body>
</html>
